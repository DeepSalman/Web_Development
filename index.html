<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
            /* height: 100%;    Ensures the parent container fills the viewport */
            margin: 0;       /* Removes default browser white space around the edge */
            width: 100%;     /* Optional: Explicitly ensures full width */
        }
        header {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000; /* Keeps it above other content */
        }

        .headdernav{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            background-color: rgb(0, 0, 0);
            padding:20px;
            border: none;
            

        }
        .headdername{
            color: white;
            font-size: medium;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            
            
        }
        .headderbutton1{
            background-color: rgb(10, 224, 153);
            border: none;
            border-radius: 5px;
            padding-left: 40px;
            padding-right: 40px;
            padding-top:5px;
            padding-bottom: 5px;
            cursor:pointer;

        }
        @media screen and (max-width:310px){
            .headdernav{
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            }
        }
        
    </style>
</head>
<body>
    <header>
        <div class="headdernav">
            <div class="headdername"><a>Salman.Dev</a></div>
            <div class="headderbutton"><button class="headderbutton1">Get in Touch</button></div>
        </div>
    </header>
    <main>
        <img src="Own\Responsiveness\photo3.jpg">
    </main>
</body>
</html>
