<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
            /* height: 100%;    Ensures the parent container fills the viewport */
            margin: 0;       /* Removes default browser white space around the edge */
            width: 100%;     /* Optional: Explicitly ensures full width */
        }
        header {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000; /* Keeps it above other content */
        }

        .headdernavtop{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            background-color: rgb(0, 0, 0);
            padding:20px;
            border: none;
            

        }
        .headdername{
            color: white;
            font-size: medium;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            
            
        }
        .headderbutton1{
            background-color: rgb(10, 224, 153);
            border: none;
            border-radius: 5px;
            padding-left: 40px;
            padding-right: 40px;
            padding-top:5px;
            padding-bottom: 5px;
            cursor:pointer;

        }
        .headdernavbottom{
            background-color: black;
            padding-bottom: 5px;
        }
        nav{
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: row;
            gap: 10px;
            justify-content: center;

            

        }
        nav a{
            color: white;
        }
        
        @media screen and (max-width:500px){
            .headdernavtop{
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            }
        }
        
        @media screen and (max-width:250px) {
            .headdernavbottom{
                display: none;
            }
        }
        @media screen and (max-width:200px) {
            .headderbutton{
                display: none;
            }
        }
        /* Styles when the user HAS NOT scrolled */
        header {
            transition: all 0.5s ease; /* Makes changes smooth */
        }

        header.scrolled {
            background-color: rgba(0, 0, 0, 0.9);
        }

        header.scrolled .headdername {
            color:rgb(159, 253, 155); 
            
        }
        header.scrolled .headdernavtop{
            display: flex;
            justify-content: center;
        }

        header.scrolled .headdernavbottom {
            display: none; 
        }

        header.scrolled .headderbutton {
            display: none; /* Hide the bottom nav links on scroll */
        }



    </style>
</head>
<body>
    <header>
        <div class="headdernavtop">
            <div class="headdername"><a>Salman.Dev</a></div>
            <div class="headderbutton"><button class="headderbutton1">Get in Touch</button></div>
            
        </div>
        <div class="headdernavbottom">
            <nav>
                <a href="">Home</a>
                <a href="">About</a>
                <a href="">Works</a>
                <a href="">Contact</a>
            </nav>
        </div>
        
    </header>
    <main>
        
        
        <img src="Own\Responsiveness\photo3.jpg" style="height: 100%;width: 100%;">
        <img src="Own\Responsiveness\photo3.jpg" style="height: 100%;width: 100%;">

        <div>
            <h1>Hello</h1>
        </div>













    </main>
    
</body>

<footer>

</footer>

<script>
    window.addEventListener("scroll", function() {
        const header = document.querySelector("header");
        // Add the 'scrolled' class if the user scrolls more than 100px
        header.classList.toggle("scrolled", window.scrollY > 300);
    });
</script>
</html>
