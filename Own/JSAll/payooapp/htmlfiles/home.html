<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Home</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body class="bg-[#f4f5f7] h-[100vh]">
        <div class="max-w-lg mx-auto bg-white-500 p-3">
            <!-- Navbar -->
            <div class=" min-h-[50px] border-b-2 border-gray-400 min-h-[50px] flex justify-between items-center max-w-lg mx-auto">
                <div class="flex items-center"><img src="../resources/assets/Group.png" alt="" class="h-[50px]">
                    <div class="">
                        <h2 class="font-semibold">$ <span id="available_balance">4500</span></h2>
                        <p class="font-semibold  text-[#08080880]">Available Balance</p>
                    </div>
                
                </div>
                <div><button class="btn text-[#08080880] p-3">Logout</button></div>
            </div>

            <!-- Middle Text -->
            <div class="max-w-lg mx-auto mt-5">
                <h1 class="text-3xl font-bold">Welcome to Payoo!</h1>
                <p>Enjoy Easy and convenient financial services with us. Cashout charge is low and Reliable</p>

            </div>

            <!-- cards -->
            <div class="border-2 border-none h-[200px] max-w-lg mx-auto mt-1 min-h-[200px] grid grid-cols-3 gap-3 ">
                <div id="add_money_div" class="border-2 border-gray-500 text-center flex flex-col justify-center rounded-3xl">
                    <img src="../resources/assets/wallet1.png " alt="" class="mx-auto">
                    <h1>Add Money</h1>
                </div>
                <div id="cash_out_div" class="border-2 border-gray-500 text-center flex flex-col justify-center rounded-3xl">
                    <img src="../resources/assets/purse1.png " alt="" class="mx-auto">
                    <h1>Cashout</h1>
                </div>
                <div class="border-2 border-gray-500 text-center flex flex-col justify-center rounded-3xl">
                    <img src="../resources/assets/money1.png " alt="" class="mx-auto">
                    <h1>Transfer Money</h1>
                </div>
                <div class="border-2 border-gray-500 text-center flex flex-col justify-center rounded-3xl">
                    <img src="../resources/assets/wallet1.png " alt="" class="mx-auto">
                    <h1>Get Bonus</h1>
                </div>
                <div class="border-2 border-gray-500 text-center flex flex-col justify-center rounded-3xl">
                    <img src="../resources/assets/wallet1.png " alt="" class="mx-auto">
                    <h1>Pay Bill</h1>
                </div>
                <div class="border-2 border-gray-500 text-center flex flex-col justify-center rounded-3xl">
                    <img src="../resources/assets/transaction1.png " alt="" class="mx-auto">
                    <h1>Transaction </h1>
                </div>


                
            </div>


            <!-- AddMoney -->
             <div id="add_money_parent" class="all-form-sections max-w-lg mx-auto" style="display: none;">
                <h1>Add Money</h1>
                <form action="" class="bg-white rounded-2xl p-8">
                    <div>
                        <h1>Select A bank</h1>
                        <select id="bank_option" class="select select-ghost ">
                        <option disabled selected>Pick a bank</option>
                        <option>Jamuna</option>
                        <option>Brac</option>
                        <option>Raleway</option>
                        </select>
                    </div>
                    <div>
                        <label class="">Bank Account Number</label>
                        <br>
                        <input id="bank_account" type="text" placeholder="Enter Your Mobile Number" class="rounded-3xl input bg-[#f4f5f7] mt-3 w-full" />
                    </div>
                    <div>
                        <label class="">Amount to add</label>
                        <br>
                        <input id="amount_add" type="text" placeholder="Enter Your Mobile Number" class="rounded-3xl input bg-[#f4f5f7] mt-3 w-full" />

                    </div>
                    <div>
                        <label class="">Pin Number</label>
                        <br>
                        <input id="pin_number" type="text" placeholder="Enter Your Mobile Number" class="rounded-3xl input bg-[#f4f5f7] mt-3 w-full" />
                    </div>
                    <button id="add-money-btn" type="submit" class="btn bg-[#0874F2] mt-3 w-full rounded-3xl text-white" id="login_button_homepage">Add Money</button>

                </form>
                
             </div>



             <!-- Cash out -->
             <div id="cash_out_parent" class="all-form-sections max-w-lg mx-auto" style="display: none;">
                <h1>Cash Out</h1>
                <form action="" class="bg-white rounded-2xl p-8">
                    
                    <div>
                        <label class="">Agent Number</label>
                        <br>
                        <input id="bank_account" type="text" placeholder="Enter Your Mobile Number" class="rounded-3xl input bg-[#f4f5f7] mt-3 w-full" />
                    </div>
                    <div>
                        <label class="">Amount</label>
                        <br>
                        <input id="amount_del" type="text" placeholder="Enter Your Mobile Number" class="rounded-3xl input bg-[#f4f5f7] mt-3 w-full" />

                    </div>
                    <div>
                        <label class="">Pin Number</label>
                        <br>
                        <input id="pin_number" type="text" placeholder="Enter Your Mobile Number" class="rounded-3xl input bg-[#f4f5f7] mt-3 w-full" />
                    </div>
                    <button id="cash-out-btn" type="submit" class="btn bg-[#0874F2] mt-3 w-full rounded-3xl text-white" id="login_button_homepage">Cash out Money</button>

                </form>
                
             </div>
        </div>

    <script src="./home.js"></script>
</body>
</html>
