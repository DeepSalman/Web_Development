<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body class="bg-[#f4f5f7] h-[100vh] flex justify-center items-center">
    <form class="border-2 border-none bg-white rounded-2xl p-5  w-[300px]">
        <div class="mt-3">
            <label class="font-semibold">Mobile Number</label>
            <br>
            <input type="text" placeholder="Enter Your Mobile Number" class="rounded-3xl input bg-[#f4f5f7] mt-3" />
        </div>
        <div class="mt-3">
            <label class="font-semibold">4 digit Pin</label>
            <br>
            <input type="text" placeholder="Enter your pin" class="rounded-3xl input bg-[#f4f5f7] mt-3" />
        </div>

        <button class="btn bg-[#0874F2] mt-3 w-full rounded-3xl text-white">Login</button>
    </form>
</body>
</html>
