<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="practice.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="form-card">
        <h2>Form</h2>
        <form id="contactForm" method="post" action="#">
        <lable for="name">Full Name</lable>
        <input id="name" type="text" name="name" required placeholder="e.g.Salman">

        <lable for="email">Email</lable>
        <input id="email" type="email" name="email" required placeholder="">

        <lable for="age">Age</lable>
        <input id="age" type="number" name="age" required placeholder="18">

        <lable for="gender" required>Gender</lable>
        <select id="gender" name="gender">
            <option value="" disabled selected hidden>Select gender</option>
            <option value="female">Female</option>
            <option value="male">Male</option>
            <option value="other">Other</option>
        </select>

        <lable for="message">Message</lable>
        <textarea id="message" name="message" rows="5" ></textarea>
        <label for="outputtext">Output</label>
        <textarea id="outputtext" name="outputtext" rows="5"></textarea>

        <button type="submit">Submit</button>

        
    </form>
    </div>
    </div>
    <script src="practice.js"></script>
</body>
</html>
