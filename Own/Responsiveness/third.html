<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Collage</title>
    <style>
        img{
            width: 100%;
            height: 100%;
        }
        .row{
            height: 400px;
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            

        }
        .vertical-collage img{
            height: 50%;
        }

        .row > div{
            flex: 1;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Picture Collage</h1>
        
    </header>
    <main>
        <section>
            <div class="row"><img src="photo2.jpg" alt=""></div>

            <div class="row">
                <div>
                    <img src="image1.jpg" alt="">
                </div>

                <div>
                    <img src="photo3.jpg" alt="">
                </div>

                <div class="vertical-collage">
                    <img src="healthyfoodjp.jpg" alt="">
                    <img src="healthyfood.avif" alt="">
                </div>
                
            </div>
            
            <div class="row">
                <div>
                    <img src="image1.jpg" alt="">
                </div>

                <div >
                    <div style="background-color:white;height: 50%; display: flex; flex-direction: row; gap: 5px;margin-bottom: 5px;">
                        <div style="width: 50%;">
                            <img src="image1.jpg" alt="">
                        </div>
                        <div style="width: 50%;;">
                            <img src="image1.jpg" alt="">
                        </div>
                    </div>
                    <div style="height: 50%; display: flex; flex-direction: row; gap: 5px;margin-bottom: 5px;">
                        <div style="width: 50%;">
                            <img src="image1.jpg" alt="">
                        </div>
                        <div style="width: 50%;">
                            <img src="image1.jpg" alt="">
                        </div>
                    </div>
                </div>

                <div>
                    <img src="photo3.jpg" alt="">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
