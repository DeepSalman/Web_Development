<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Collage</title>
    <style>
        img{
            width: 100%;
            height: 100%;
        }
        .row{
            height: 400px;
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            

        }
        .vertical-collage img{
            height: 50%;
        }

        .row > div{
            flex: 1;
            
        }
        .square-collage{
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 5px;

            
        }

        @media  screen and (max-width:576px) {
            .row{
                flex-direction: column;
                height: auto;
            }
            .square-collage{
                display: grid;
                grid-template-columns: 1fr;
            }
        }
        /* Medium Devices*/
        

    </style>
</head>
<body>
    <header>
        <h1>My Picture Collage</h1>
        
    </header>
    <main>
        <section>
            <div class="row"><img src="photo2.jpg" alt=""></div>

            <div class="row">
                <div>
                    <img src="image1.jpg" alt="">
                </div>

                <div>
                    <img src="photo3.jpg" alt="">
                </div>

                <div class="vertical-collage">
                    <img src="healthyfoodjp.jpg" alt="">
                    <img src="healthyfood.avif" alt="">
                </div>
                
            </div>
            
            <div class="row" style="background-color: red;">
                <div>
                    <img src="image1.jpg" alt="">
                </div>

                <div class="square-collage">
                    <img src="healthyfoodjp.jpg" alt="">
                    <img src="healthyfoodjp.jpg" alt="">
                    <img src="healthyfoodjp.jpg" alt="">
                    <img src="healthyfoodjp.jpg" alt="">
                </div>

                <div>
                    <img src="photo3.jpg" alt="">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
