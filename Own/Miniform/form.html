<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Simple Input Form</title>
		<link rel="stylesheet" href="formstyle.css">
	</head>
	<body>
		<div class="page-wrapper">
			<div class="form-card">
				<h1>Contact Form</h1>

                <!--
                For=Links lable to the input
                type=what kind of input it is
                id=
                name= This is the most important attribute for the server. 
                When the form is submitted, the data is sent as a 
                pair: name=YourEnteredValue. Without a name attribute, 
                the server won't receive the data from this box.
                
                required= A built in validation

                PlaceHolder= hint inside the box
                
                
                -->
				<form id="contactForm" method="post" action="#">
					<label for="name">Full name</label>
					<input type="text" id="name" name="name" required placeholder="Your Name">

					<label for="email">Email</label>
					<input type="email" id="email" name="email" required>

					  <label for="age">Age</label>
					  <input type="number" id="age" name="age" min="0" required>

					<label for="gender">Gender</label>
					<select id="gender" name="gender" required> 
						<option value="" disabled selected hidden>Select gender</option>
						<option value="female">Female</option>
						<option value="male">Male</option>
						<option value="other">Other</option>
					</select>

					  <label for="message">Message</label>
					  <textarea id="message" name="message" rows="5" required></textarea>

					<button type="submit">Submit</button>
				</form>
			</div>
		</div>
		<script src="formscript.js"></script>
	</body>
</html>
