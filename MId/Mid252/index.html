<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body style="">
    <div id="maindiv" style="border: 1px solid black; width: 1000px; height: 850px;">
        <div id="firstdiv" style="background-color: rgb(180, 179, 179);display: flex;justify-content: space-between;color: rgb(65, 64, 64);">
            <div style="display: flex; gap: 15px;">
                <span>Dashboard</span>
                <span>Courses</span>
                <span>Notification</span>
                <span>Results</span>
            </div>
            <div style="display:flex;gap: 10px;">
                <span>Login</span>
                <span style="margin-right: 5px;">Sign UP</span>
            </div>
        </div>





        <div id="seconddiv" style="background-color: red;display: flex;height: 800px;">
            <div id="secondleftInnerdiv" style="background-image: linear-gradient(aqua,purple);width: 40%;">
                <div style="display: flex;flex-direction: column;margin-left: 10px;">
                    <h2>Semester</h2>
                    <div>
                        <p style="border: 1px solid black; border-radius: 5px;padding:10px; width: 90%;">Spring 2025</p>
                        <p style="border: 1px solid black; border-radius: 5px;padding:10px; width: 90%;">Fall 2024</p>
                        <p style="border: 1px solid black; border-radius: 5px;padding:10px; width: 90%;">Summer 2024</p>
                        <p style="border: 1px solid black; border-radius: 5px;padding:10px; width: 90%; height: 200px;">Important Notice</p>
                    </div>
                </div>
            </div>





            <div id="secondrightinnerdiv" style="background-color: orange;width: 60%;display: flex;flex-direction: column;">
                <div id="secondrightinnerupper" style="background-color: aqua;height: 30%;">
                    hello

                </div>
                <div id="secondrightinnerlower" style="background-color: red;height: 50%;margin-top: 40px;border: 1px solid white;border-radius: 5px;">
                    <div class="headerStyle">Sign Up Form</div>
                        <div class="fieldName">Full Name</div>
                        <input class="inputClass" placeholder="Enter full name" type="text">
                        <div class="fieldName">Student ID</div>
                        <input class="inputClass" placeholder="e.g 011233001" type="text">
                        <div class="fieldName">UIU Email</div>
                        <input class="inputClass" placeholder="name@students.uiu.ac.bd" type="text">
                        <div class="fieldName">Password</div>
                        <input class="inputClass" placeholder="Enter password" type="password">
                        <br>
                        <button class="buttonProp" id="registerButton">Register</button>
                    </div>
                </div>
            </div>

        </div>



        <div id="thirddiv" style="background-color: red;height: 30px;display: flex;justify-content: center;align-items: center;background-image: linear-gradient(to right,red,green,gray);color: white;">
            &copy2025 United international University
        </div>
        
    </div>
</body>
</html>
